services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: railpulse_postgres
    environment:
      POSTGRES_USER: railpulse
      POSTGRES_PASSWORD: railpulse
      POSTGRES_DB: railpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: railpulse_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # If you have an Nvidia GPU, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build: .
    container_name: railpulse_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://railpulse:railpulse@postgres:5432/railpulse
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  ollama_data:
